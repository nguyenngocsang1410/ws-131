[defaults]
# Run ansible from inside this directory and these relative paths resolve.
inventory            = inventory/hosts.yml
roles_path           = roles
collections_path     = collections:~/.ansible/collections
interpreter_python   = auto_silent
host_key_checking    = False
retry_files_enabled  = False
nocows               = True
# Human-friendly YAML output via the built-in default callback
# (the old community.general.yaml callback was removed in v12).
stdout_callback        = default
callback_result_format = yaml
forks                = 10
# Fact caching (optional) — uncomment to speed up repeated runs.
# fact_caching         = jsonfile
# fact_caching_connection = .facts_cache
# fact_caching_timeout = 7200

[privilege_escalation]
# Privileged tasks use sudo. This machine does NOT have passwordless sudo,
# so run privileged playbooks with -K (prompt for the become/sudo password).
become         = False
become_method  = sudo
become_ask_pass = False
