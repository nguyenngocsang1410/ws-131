---
# Inventory — this machine only.
#
# The control node IS the managed node, so we use a local connection
# (no SSH). Modules execute with the SYSTEM python (/usr/bin/python3),
# which carries the python3-apt bindings needed by the `apt` module —
# the conda python at /home/vietnq37/conda/bin/python3 does NOT have them.
all:
  children:
    local:
      hosts:
        vsi-precision-3680:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3
